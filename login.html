<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    .login-container h1 {
      margin-bottom: 1.5rem;
      color: var(--dark-brown);
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .login-form input {
      padding: 0.75rem;
      border: 1px solid var(--light-gray);
      border-radius: 0.5rem;
      font-size: 1rem;
    }
    .login-form button {
      padding: 0.75rem;
      background: var(--brown);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    .login-form button:hover {
      background: var(--dark-brown);
    }
    .error {
      color: red;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Portfolio Login</h1>
    <form class="login-form" id="loginForm">
      <input type="password" id="password" placeholder="Passwort eingeben" required>
      <button type="submit">Anmelden</button>
    </form>
    <div class="error" id="error"></div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const passwordInput = document.getElementById('password');
    const errorDiv = document.getElementById('error');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const password = passwordInput.value;
      // Einfaches hartcodiertes Passwort - in Produktion sicherer machen!
      if (password === 'portfolio2026') {
        localStorage.setItem('loggedIn', 'true');
        window.location.href = 'index.html';
      } else {
        errorDiv.textContent = 'Falsches Passwort. Versuchen Sie es erneut.';
      }
    });
  </script>
</body>
</html></content>
