<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotografie | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="project4">
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Portfolio</a>
      <nav>
        <a href="index.html#projects" data-i18n="nav.backProjects">Zurück zu Projekten</a>
        <button type="button" class="lang-toggle" data-language-toggle aria-label="Switch language">EN</button>
      </nav>
    </div>
  </header>

  <main class="gallery-page">
    <section class="gallery-header">
      <p class="eyebrow" data-i18n="header.eyebrow">Portfolio</p>
      <h1 data-i18n="header.title">Fotografie</h1>
      <p data-i18n="header.text">Eine Auswahl meiner fotografischen Arbeiten aus Schule und Freizeit.</p>
    </section>

    <section class="gallery-grid">
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80" alt="Porträtfotografie" data-i18n-alt="gallery.1.alt">
        <div class="overlay"><span data-i18n="gallery.1.label">Porträt</span></div>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7?auto=format&fit=crop&w=900&q=80" alt="Landschaftsfotografie" data-i18n-alt="gallery.2.alt">
        <div class="overlay"><span data-i18n="gallery.2.label">Landschaft</span></div>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308?auto=format&fit=crop&w=900&q=80" alt="Street Photography" data-i18n-alt="gallery.3.alt">
        <div class="overlay"><span data-i18n="gallery.3.label">Street</span></div>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=900&q=80" alt="Porträtaufnahme" data-i18n-alt="gallery.4.alt">
        <div class="overlay"><span data-i18n="gallery.4.label">Porträt</span></div>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=900&q=80" alt="Naturfotografie" data-i18n-alt="gallery.5.alt">
        <div class="overlay"><span data-i18n="gallery.5.label">Natur</span></div>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1516117172878-fd2c41f4a759?auto=format&fit=crop&w=900&q=80" alt="Detailaufnahme" data-i18n-alt="gallery.6.alt">
        <div class="overlay"><span data-i18n="gallery.6.label">Detail</span></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
