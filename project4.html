<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotografie | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Portfolio</a>
      <nav>
        <a href="index.html#projects">Zurück zu Projekten</a>
      </nav>
    </div>
  </header>

  <main class="gallery-page">
    <section class="gallery-header">
      <p class="eyebrow">Portfolio</p>
      <h1>Fotografie</h1>
      <p>Eine Auswahl meiner fotografischen Arbeiten aus Schule und Freizeit.</p>
    </section>

    <section class="gallery-grid">
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80" alt="Porträtfotografie">
        <div class="overlay">
          <span>Portrait</span>
        </div>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7?auto=format&fit=crop&w=900&q=80" alt="Landschaftsfotografie">
        <div class="overlay">
          <span>Landscape</span>
        </div>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308?auto=format&fit=crop&w=900&q=80" alt="Street Photography">
        <div class="overlay">
          <span>Street</span>
        </div>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=900&q=80" alt="Porträtaufnahme">
        <div class="overlay">
          <span>Portrait</span>
        </div>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=900&q=80" alt="Naturfotografie">
        <div class="overlay">
          <span>Nature</span>
        </div>
      </div>

      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1516117172878-fd2c41f4a759?auto=format&fit=crop&w=900&q=80" alt="Detailaufnahme">
        <div class="overlay">
          <span>Detail</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
